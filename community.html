<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Community - CogniStudy</title>

    <!-- 🔥 LINK YOUR MAIN STYLES -->
    <link rel="stylesheet" href="style.css">

    <!-- 🔥 COMMUNITY PAGE STYLE -->
    <link rel="stylesheet" href="community.css">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<div class="community-wrapper">

    <h2 class="title">🔥 Community Hub</h2>

    <div class="tabs">
        <button onclick="showTab('feed')">Feed</button>
        <button onclick="showTab('leaderboard')">Leaderboard</button>
        <button onclick="showTab('rooms')">Rooms</button>
    </div>

    <div class="content-grid">

        <!-- LEFT -->
        <div class="main-area">


            <div class="post-box card">
                <div class="post-input-row">
                    <img src="https://i.pravatar.cc/40" class="avatar">

                    <input id="postInput" placeholder="Share your progress or ask for motivation..." />

                    <button onclick="addPost()" class="post-btn">Post</button>
                </div>
            </div>

            <div id="feedContainer"></div>

            <!-- FEED -->
            <div id="feedTab" class="tab-content">
                <div class="card">
                    🎉 Abhishek completed 11h study!
                </div>

                <div class="card">
                    🔥 Rahul reached 5 day streak
                </div>
            </div>

            <!-- LEADERBOARD -->
            <div id="leaderboardTab" class="tab-content" style="display:none;">
                <div class="card">
                    🥇 Abhishek (20h)
                </div>
                <div class="card">
                    🥈 Rahul (18h)
                </div>
                <div class="card">
                    🥉 Aman (15h)
                </div>
            </div>

            <!-- ROOMS -->
            <div id="roomsTab" class="tab-content" style="display:none;">
                <div class="card">
                    📚 DSA Focus Room <br><br>
                    <button>Join Room</button>
                </div>
            </div>

        </div>

        <!-- RIGHT -->
        <div class="side-area">

            <div id="challengeBox"></div>

            <div class="card">
                🔥 Hot Challenges <br><br>
                7 Day Consistency
            </div>

            <div class="card">
                🏆 Your Rank <br><br>
                #5 this week
            </div>

            <div class="card">
                👥 Online Users <br><br>
                🟢 Abhishek <br>
                🟢 Rahul <br>
                🟢 Aman
            </div>


            

        </div>

    </div>

</div>

<script src="community.js"></script>

</body>
</html>
